name: Build

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DALAMUD_HOME: /tmp/dalamud
      DALAMUD_ARCHIVE_URL: ${{ vars.DALAMUD_ARCHIVE_URL || 'https://goatcorp.github.io/dalamud-distrib/latest.zip' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        run: |
          wget ${{ env.DALAMUD_ARCHIVE_URL }} -O ${{ env.DALAMUD_HOME }}.zip
          unzip ${{ env.DALAMUD_HOME }}.zip -d ${{ env.DALAMUD_HOME }}

      - name: Build Project
        run: |
          if ! dotnet build --configuration Release AutoSort/AutoSort.csproj; then
            echo "::notice::Stable Dalamud build failed, retrying with staging..."
            rm -rf $DALAMUD_HOME
            wget https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -O $DALAMUD_HOME.zip
            unzip $DALAMUD_HOME.zip -d $DALAMUD_HOME
            dotnet build --configuration Release AutoSort/AutoSort.csproj
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoSort
          retention-days: 14
          path: |
            AutoSort/bin/Release/*
            !AutoSort/bin/Release/AutoSort/
